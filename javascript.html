  /**
   * Translates all elements marked with translation attributes.
   */
  function translateUI() {
    const langData = i18n[currentLanguage];
    
    // Translate textContent for elements with data-i18n
    document.querySelectorAll("[data-i18n]").forEach(element => {
      const key = element.getAttribute("data-i18n");
      if (langData[key]) {
        element.textContent = langData[key];
      }
    });

    // Translate placeholder attributes
    document.querySelectorAll("[data-i18n-placeholder]").forEach(element => {
      const key = element.getAttribute("data-i18n-placeholder");
      if (langData[key]) {
        element.setAttribute("placeholder", langData[key]);
      }
    });
    
    // Special translation for select dropdown defaults
    const statusSelect = document.getElementById("employmentStatus");
    const selectPlaceholderOption = statusSelect.options[0];
    if (selectPlaceholderOption) {
      selectPlaceholderOption.textContent = langData.statusSelect;
    }
    
    const optWorking = statusSelect.querySelector("option[value='Still Working']");
    if (optWorking) optWorking.textContent = langData.statusWorking;
    
    const optResigned = statusSelect.querySelector("option[value='Resigned']");
    if (optResigned) optResigned.textContent = langData.statusResigned;
    
    const optTerminated = statusSelect.querySelector("option[value='Terminated']");
    if (optTerminated) optTerminated.textContent = langData.statusTerminated;
    
    // Refresh context-dependent labels (e.g. Date of Resignation vs. Date of Termination)
    handleStatusChange();
  }

  /**
   * Binds focus out and input events for real-time validation checks.
   */
  function setupRealtimeValidation() {
    const fields = [
      "employeeName", "phoneNumber", "email", "designation", 
      "salary", "dateOfJoining", "dateOfLeaving", "reason",
      "benefitsReceived", "pendingSalary", "retrenchmentCompensation", "otherCompensation"
    ];
    
    fields.forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        // Run validation on blur
        el.addEventListener("blur", () => validateField(id));
        // Clear red error highlights during writing
        el.addEventListener("input", () => {
          if (el.classList.contains("invalid")) {
            validateField(id);
          }
        });
      }
    });

    document.getElementById("declaration").addEventListener("change", function() {
      validateField("declaration");
    });
  }

  /**
   * Re-evaluates active validation fields.
   */
  function revalidateActiveFields() {
    const activeErrors = document.querySelectorAll(".form-control.invalid");
    activeErrors.forEach(el => {
      validateField(el.id);
    });
    
    const decCheckbox = document.getElementById("declaration");
    if (decCheckbox.closest(".declaration-wrapper").style.border) {
      validateField("declaration");
    }
  }

  /**
   * Validates a single input field. Updates UI and errors.
   * @param {string} id Field ID
   * @return {boolean} True if field passes validation
   */
  function validateField(id) {
    const el = document.getElementById(id);
    if (!el) return true;
    
    const val = el.value.trim();
    const langData = i18n[currentLanguage];
    let isValid = true;
    let errMsg = "";
    
    // Check if field is currently hidden in UI
    if (id === "dateOfLeaving" || id === "reason") {
      const status = document.getElementById("employmentStatus").value;
      if (status !== "Resigned" && status !== "Terminated") {
        clearFieldError(id);
        return true;
      }
    }

    switch(id) {
      case "employeeName":
        if (val.length < 3) {
          isValid = false;
          errMsg = langData.errNameLength;
        }
        break;
        
      case "commissionFormFilled":
        if (val !== "Yes" && val !== "No") {
          isValid = false;
          errMsg = langData.errCommForm;
        }
        break;
        
      case "phoneNumber":
        const phoneRegex = /^[6-9]\d{9}$/;
        if (!phoneRegex.test(val)) {
          isValid = false;
          errMsg = langData.errPhoneFormat;
        }
        break;
        
      case "email":
        if (val.length === 0) {
          isValid = false;
          errMsg = langData.errEmailRequired;
        } else {
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailRegex.test(val)) {
            isValid = false;
            errMsg = langData.errEmailFormat;
          }
        }
        break;
        
      case "designation":
        if (val.length === 0) {
          isValid = false;
          errMsg = langData.errDesignation;
        }
        break;
        
      case "salary":
        if (val === "" || isNaN(val) || parseFloat(val) < 0) {
          isValid = false;
          errMsg = langData.errSalary;
        }
        break;
        
      case "dateOfJoining":
        if (val === "" || isFutureDate(val)) {
          isValid = false;
          errMsg = langData.errJoiningDate;
        }
        break;
        
      case "dateOfLeaving":
        if (val === "" || isFutureDate(val)) {
          isValid = false;
          errMsg = langData.errLeavingDate;
        } else {
          // Compare joining and leaving date
          const joinVal = document.getElementById("dateOfJoining").value;
          if (joinVal !== "" && !isFutureDate(joinVal)) {
            if (new Date(joinVal) > new Date(val)) {
              isValid = false;
              errMsg = langData.errLeavingChronology;
            }
          }
        }
        break;
        
      case "reason":
        if (val.length < 5) {
          isValid = false;
          errMsg = langData.errReason;
        }
        break;
        
      case "benefitsReceived":
        if (val === "" || isNaN(val) || parseFloat(val) < 0) {
          isValid = false;
          errMsg = langData.errBenefits;
        }
        break;
        
      case "pendingSalary":
        if (val === "" || isNaN(val) || parseFloat(val) < 0) {
          isValid = false;
          errMsg = langData.errPendingSalary;
        }
        break;
        
      case "retrenchmentCompensation":
        if (val === "" || isNaN(val) || parseFloat(val) < 0) {
          isValid = false;
          errMsg = langData.errRetrenchment;
        }
        break;
        
      case "otherCompensation":
        if (val === "" || isNaN(val) || parseFloat(val) < 0) {
          isValid = false;
          errMsg = langData.errOtherComp;
        }
        break;
        
      case "declaration":
        if (!el.checked) {
          isValid = false;
          errMsg = langData.errDeclaration;
        }
        break;
    }
    
    if (isValid) {
      setFieldSuccess(id);
    } else {
      setFieldError(id, errMsg);
    }
    
    return isValid;
  }

  /**

      errBox.style.display = "flex";
      return;
    }
    
    if (id === "commissionFormFilled") {
      const container = document.getElementById("commFormSegmentContainer");
      if (container) container.style.borderColor = "var(--error)";
      
      const errBox = document.getElementById("error-commissionFormFilled");
      if (errBox) {
        errBox.innerHTML = '<span class="material-icons-outlined" style="font-size: 14px; margin-right: 4px; display: inline-flex; align-items: center;">error_outline</span>' + message;
        errBox.style.display = "flex";
      }
      return;
    }
    
    el.classList.add("invalid");

    const errBox = document.getElementById("error-" + id);
    if (errBox) {
      errBox.innerHTML = '<span class="material-icons-outlined" style="font-size: 14px; margin-right: 4px; display: inline-flex; align-items: center;">error_outline</span>' + message;
      errBox.style.display = "flex";

  /**

   */
  function setFieldSuccess(id) {
    const el = document.getElementById(id);
    if (id === "declaration") {

      }

    if (errBox) {

      errBox.style.display = "none";

  }

  /**

   */
  function clearFieldError(id) {
    const el = document.getElementById(id);
    if (!el) return;
    
    if (id === "declaration") {

    if (errBox) {

      errBox.style.display = "none";
    }
  }

  /**
   * Helper to check for future dates.
   * @param {string} dateVal Date string YYYY-MM-DD
   */
  function isFutureDate(dateVal) {
    if (!dateVal) return false;
    const selectedDate = new Date(dateVal);
    // Remove hours to compare only date
    selectedDate.setHours(0,0,0,0);
    const today = new Date();
    today.setHours(0,0,0,0);
    return selectedDate > today;
  }

  /**
   * Loops through all fields to check valid form entries.
   * Auto-scrolls UI focus onto first invalid field found.
   */
  function validateAllFields() {
    const fields = [
      "employeeName", "phoneNumber", "email", "designation", 
      "salary", "dateOfJoining", "dateOfLeaving", "reason",
      "benefitsReceived", "pendingSalary", "retrenchmentCompensation", "otherCompensation",
      "commissionFormFilled", "declaration"
    ];
    
    let isAllValid = true;
    let firstInvalidElement = null;
    
    fields.forEach(id => {
      const isValid = validateField(id);
      if (!isValid) {
        isAllValid = false;
        if (!firstInvalidElement) {
          firstInvalidElement = document.getElementById(id);
        }
      }
    });
    
    if (!isAllValid && firstInvalidElement) {
      // Focus element and scroll smoothly to it
      if (firstInvalidElement.type === "checkbox") {
        firstInvalidElement.closest(".declaration-wrapper").scrollIntoView({
          behavior: "smooth",
          block: "center"
        });
      } else {
        firstInvalidElement.focus();
        firstInvalidElement.scrollIntoView({
          behavior: "smooth",
          block: "center"
        });
      }
    }
    
    return isAllValid;
  }

  /**
   * Submits form values to google.script.run backend.
   * @param {Event} event Form submit event
   */
  function handleFormSubmit(event) {
    event.preventDefault();
    
    if (!validateAllFields()) {
      showToast("error", i18n[currentLanguage].errFormGeneric);
      return;
    }
    
    // Show spinner overlay and disable submit button
    showLoader(true);
    document.getElementById("btnSubmitForm").disabled = true;
    
    // Assemble payload
    const formData = {
      employeeName: document.getElementById("employeeName").value,
      phoneNumber: document.getElementById("phoneNumber").value,
      email: document.getElementById("email").value,
      employeeId: document.getElementById("employeeId").value,
      designation: document.getElementById("designation").value,
      salary: document.getElementById("salary").value,
      dateOfJoining: document.getElementById("dateOfJoining").value,
      employmentStatus: document.getElementById("employmentStatus").value,
      dateOfLeaving: document.getElementById("dateOfLeaving").value,
      reason: document.getElementById("reason").value,
      benefitsReceived: document.getElementById("benefitsReceived").value,
      pendingSalary: document.getElementById("pendingSalary").value,
      retrenchmentCompensation: document.getElementById("retrenchmentCompensation").value,
      otherCompensation: document.getElementById("otherCompensation").value,
      declaration: document.getElementById("declaration").checked,
      commissionFormFilled: document.getElementById("commissionFormFilled").value
    };
    
    // If running in local browser preview (Live Server), simulate server response
    if (typeof google === 'undefined' || typeof google.script === 'undefined') {
      console.log("Local Preview Submit Simulation payload:", formData);
      setTimeout(() => {
        onFormSubmitSuccess({
          success: true,
          message: "Local Simulation: Details submitted successfully.",
          submissionId: "TLR-2026-TEST"
        });
      }, 1500);
      return;
    }

    // Call server-side submit endpoint
    google.script.run
      .withSuccessHandler(onFormSubmitSuccess)
      .withFailureHandler(onFormSubmitFailure)
      .submitForm(formData);
  }

  /**
   * Handles successful responses from server-side submitForm.
   * @param {Object} response Standard JSON response payload

  function updateStats(stats, list) {
    document.getElementById("statTotalCount").textContent = stats.totalEmployees;
    document.getElementById("statPendingSalary").textContent = "₹" + stats.totalPendingSalary.toLocaleString("en-IN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    
    // Count active and exited
    let active = 0;
    let exited = 0;
    
    list.forEach(row => {
      if (row.employmentStatus === "Still Working") {
        active++;
      } else {
        exited++;
      }
    });
    
    document.getElementById("statActiveCount").textContent = active;
    document.getElementById("statExitedCount").textContent = exited;
  }

  /**
   * Extracts unique designations to load filter.
   */
  function buildDesignationDropdown(list) {
    uniqueDesignations.clear();
    list.forEach(row => {
      if (row.designation) {
        uniqueDesignations.add(row.designation.trim());
      }
    });
    
    const dropdown = document.getElementById("designationFilter");
    // Clear dynamic options while preserving "All" index 0
    dropdown.options.length = 1;
    
    uniqueDesignations.forEach(desig => {
      const option = document.createElement("option");
      option.value = desig;
      option.textContent = desig;
      dropdown.appendChild(option);
    });
  }

  /**
   * Matches, filters, and renders the submissions list to the table UI.
   */
  function renderAdminTable() {
    const tableBody = document.getElementById("submissionsTableBody");
    tableBody.innerHTML = "";
    
    const searchQuery = document.getElementById("searchBox").value.toLowerCase().trim();
    const statusVal = document.getElementById("statusFilter").value;
    const designationVal = document.getElementById("designationFilter").value;
    const langData = i18n[currentLanguage];
    
    const filteredList = allSubmissions.filter(row => {
      // 1. Search Query filter (matches Name, Phone, ID, designation)
      const nameMatch = row.employeeName.toLowerCase().indexOf(searchQuery) !== -1;
      const phoneMatch = row.phoneNumber.indexOf(searchQuery) !== -1;
      const idMatch = row.employeeId.toLowerCase().indexOf(searchQuery) !== -1;
      const designMatch = row.designation.toLowerCase().indexOf(searchQuery) !== -1;
      const subIdMatch = row.submissionId.toLowerCase().indexOf(searchQuery) !== -1;
      
      const passesSearch = (nameMatch || phoneMatch || idMatch || designMatch || subIdMatch || (row.commissionFormFilled || "").toLowerCase().indexOf(searchQuery) !== -1);
      
      // 2. Status dropdown filter
      const passesStatus = (statusVal === "ALL" || row.employmentStatus === statusVal);
      
      // 3. Designation dropdown filter
      const passesDesignation = (designationVal === "ALL" || row.designation === designationVal);
      
      return (passesSearch && passesStatus && passesDesignation);
    });
    
    if (filteredList.length === 0) {
      const tr = document.createElement("tr");
      const td = document.createElement("td");
      td.colSpan = 9;
      td.style.textAlign = "center";
      td.style.padding = "24px";
      td.style.color = "var(--text-secondary)";
      td.textContent = currentLanguage === "en" ? "No matches found." : "വിവരങ്ങൾ ലഭ്യമല്ല.";
      tr.appendChild(td);
      tableBody.appendChild(tr);
      return;
    }
    
    // Populate rows
    filteredList.forEach(row => {
      const tr = document.createElement("tr");
      
      // Translate dynamic status for badging
      let badgeClass = "badge-still-working";
      let statusText = row.employmentStatus;
      
      if (row.employmentStatus === "Resigned") {
        badgeClass = "badge-resigned";
        statusText = langData.statusResigned;
      } else if (row.employmentStatus === "Terminated") {
        badgeClass = "badge-terminated";
        statusText = langData.statusTerminated;
      } else {
        statusText = langData.statusWorking;
      }
      
      const currencyStr = "₹" + row.pendingSalary.toLocaleString("en-IN", { minimumFractionDigits: 2 });
      
      tr.innerHTML = `
        <td><strong>${row.submissionId}</strong></td>
        <td>${row.employeeName} ${row.employeeId ? `<br><small style="color:var(--text-secondary)">ID: ${row.employeeId}</small>` : ''}</td>
        <td>${row.phoneNumber}</td>
        <td>${row.designation}</td>
        <td><span class="badge ${badgeClass}">${statusText}</span></td>
        <td>${currencyStr}</td>
        <td>${row.dateOfJoining}</td>
        <td>${row.dateOfLeaving || '-'}</td>
        <td><span class="badge" style="background-color: ${row.commissionFormFilled === 'Yes' ? 'var(--success-light)' : '#f1f5f9'}; color: ${row.commissionFormFilled === 'Yes' ? 'var(--success)' : 'var(--text-secondary)'};">${row.commissionFormFilled === 'Yes' ? langData.yesOpt : langData.noOpt}</span></td>
      `;
      
      tableBody.appendChild(tr);
    });
  }

  /**
   * Generates a downloadable CSV attachment.
   */
  function exportToCSV() {
    if (allSubmissions.length === 0) {
      showToast("error", "No data to export.");
      return;
    }
    
    const headers = [
      "Submission ID", "Timestamp", "Employee Name", "Phone Number", "Email", 
      "Employee ID", "Designation", "Salary", "Date of Joining", "Date of Leaving", 
      "Status", "Reason", "Benefits Received", "Pending Salary", "Retrenchment Amount", "Other Pending", "Commission Form Filled"
    ];
    
    let csvContent = "\uFEFF"; // Prepend BOM for Excel compatibility
    csvContent += headers.map(h => `"${h.replace(/"/g, '""')}"`).join(",") + "\r\n";
    
    allSubmissions.forEach(row => {
      const record = [
        row.submissionId,
        row.timestamp,
        row.employeeName,
        row.phoneNumber,
        row.email,
        row.employeeId,
        row.designation,
        row.salary,
        row.dateOfJoining,
        row.dateOfLeaving,
        row.employmentStatus,
        row.reason,
        row.benefitsReceived,
        row.pendingSalary,
        row.retrenchmentCompensation,
        row.otherCompensation,
        row.commissionFormFilled
      ];
      csvContent += record.map(toSafeCsvCell).join(",") + "\r\n";
    });
    
    // Trigger download link
    const csvBlob = new Blob([csvContent], { type: "text/csv;charset=utf-8" });
    const downloadUrl = URL.createObjectURL(csvBlob);
    const link = document.createElement("a");
    const dateStr = new Date().toISOString().split('T')[0];
    
    link.setAttribute("href", downloadUrl);
    link.setAttribute("download", `Talrop_Employee_Submissions_${dateStr}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(downloadUrl);
  }

  /**
   * Quotes a CSV field and prevents spreadsheet applications from evaluating
   * employee-entered values as formulas.
   */
  function toSafeCsvCell(value) {
    let text = value === null || value === undefined ? "" : String(value);
    if (/^[=+\-@]/.test(text)) {
      text = "'" + text;
    }
    return `"${text.replace(/"/g, '""')}"`;
  }

  /* ------------------- Helper UI Alerts ------------------- */

  /**
   * Shows global loader overlay.
   */
  function showLoader(show) {
    const overlay = document.getElementById("spinnerOverlay");
    if (show) {
      overlay.classList.add("active");
    } else {
      overlay.classList.remove("active");
    }
  }

  /**
   * Generates temporary toast alert notification popup.
   * @param {string} type Alert category ("success" | "error")
   * @param {string} message Description text
   */
  function showToast(type, message) {
    const container = document.getElementById("toastContainer");
    
    const toast = document.createElement("div");
    toast.className = `toast toast-${type}`;
    
    const icon = type === "success" ? "✓" : "⚠";
    const iconClass = type === "success" ? "toast-icon-success" : "toast-icon-error";
    
    toast.innerHTML = `
      <span class="toast-icon ${iconClass}">${icon}</span>
      <div class="toast-body">${message}</div>
      <span class="toast-close">&times;</span>
    `;
    
    // Close button event
    toast.querySelector(".toast-close").addEventListener("click", () => {
      toast.style.opacity = "0";
      setTimeout(() => toast.remove(), 250);
    });
    
    container.appendChild(toast);
    
    // Auto-remove after 4 seconds
    setTimeout(() => {
      if (toast.parentNode) {
        toast.style.opacity = "0";
        setTimeout(() => toast.remove(), 250);
      }
    }, 4000);
  }
</script>
